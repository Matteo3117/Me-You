<!doctype html>
<html lang="it">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="color-scheme" content="dark" />
    <title>Segreto su Misura</title>
    <style>
      :root{
        --bg0:#050205;
        --bg1:#0b0612;
        --ink:#f6e7ff;
        --muted:#cbb6e6;
        --danger:#ff6b86;
        --gold:#d9b36a;
        --gold2:#8a5a1f;
        --glass: rgba(255,255,255,.06);
        --glass2: rgba(255,255,255,.10);
        --shadow: rgba(0,0,0,.65);
        --shadow2: rgba(0,0,0,.35);
        --ring: rgba(217,179,106,.55);
        --ok: rgba(120, 220, 160, .85);
        --safeW: clamp(260px, 78vw, 430px);
        --safeH: clamp(220px, 62vw, 360px);
      }

      *{ box-sizing: border-box; }
      html, body{ height: 100%; }
      body{
        margin: 0;
        font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Arial, "Apple Color Emoji", "Segoe UI Emoji";
        background:
          radial-gradient(1200px 600px at 50% 15%, rgba(217,179,106,.20), transparent 60%),
          radial-gradient(900px 500px at 20% 80%, rgba(176,92,255,.12), transparent 62%),
          radial-gradient(900px 500px at 85% 75%, rgba(255,120,170,.10), transparent 55%),
          linear-gradient(180deg, var(--bg0), var(--bg1));
        color: var(--ink);
        overflow-x: hidden;
      }

      .ambient{
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 0;
      }
      .ambient::before,
      .ambient::after{
        content:"";
        position:absolute;
        inset:-40%;
        background:
          radial-gradient(circle at 25% 30%, rgba(217,179,106,.15), transparent 40%),
          radial-gradient(circle at 70% 20%, rgba(160,90,255,.12), transparent 38%),
          radial-gradient(circle at 60% 80%, rgba(255,120,170,.10), transparent 45%);
        filter: blur(35px);
        opacity: .85;
        transform: translate3d(0,0,0);
        animation: drift 18s ease-in-out infinite;
      }
      .ambient::after{
        opacity: .55;
        animation-duration: 26s;
        filter: blur(55px);
      }

      @keyframes drift{
        0%{ transform: translate3d(-2%, -1%, 0) scale(1.02) }
        50%{ transform: translate3d(2%, 1.5%, 0) scale(1.04) }
        100%{ transform: translate3d(-2%, -1%, 0) scale(1.02) }
      }

      .grain{
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 1;
        opacity: .075;
        mix-blend-mode: overlay;
        background:
          repeating-linear-gradient(0deg, rgba(255,255,255,.10) 0px, rgba(255,255,255,.10) 1px, transparent 1px, transparent 3px),
          repeating-linear-gradient(90deg, rgba(217,179,106,.12) 0px, rgba(217,179,106,.12) 1px, transparent 1px, transparent 4px);
        filter: contrast(120%) brightness(0.92);
        animation: grainShift 7s steps(10) infinite;
      }
      @keyframes grainShift{
        0%{ transform: translate3d(0,0,0) }
        15%{ transform: translate3d(-2%, 1%, 0) }
        35%{ transform: translate3d(2%, -1%, 0) }
        55%{ transform: translate3d(-1%, -2%, 0) }
        75%{ transform: translate3d(1%, 2%, 0) }
        100%{ transform: translate3d(0,0,0) }
      }

      #bgCanvas{
        position: fixed;
        inset: 0;
        width: 100%;
        height: 100%;
        z-index: 0;
        pointer-events: none;
        opacity: .85;
      }

      .app{
        position: relative;
        z-index: 1;
        min-height: 100%;
        display: grid;
        place-items: center;
        padding: 18px 14px max(18px, env(safe-area-inset-bottom));
      }

      .scene{
        width: min(560px, 100%);
        display: grid;
        justify-items: center;
        gap: 16px;
        text-align: center;
      }

      .hidden{ display:none !important; }

      /* Password gate */
      .gate-card{
        width: min(520px, 100%);
        background: linear-gradient(180deg, rgba(255,255,255,.07), rgba(255,255,255,.04));
        border: 1px solid rgba(217,179,106,.22);
        border-radius: 18px;
        box-shadow:
          0 30px 80px rgba(0,0,0,.45),
          0 0 0 1px rgba(255,255,255,.04) inset;
        padding: 18px 16px 16px;
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        transform: translateZ(0);
      }

      .gate-shimmer{
        height: 8px;
        width: 100%;
        border-radius: 999px;
        background: linear-gradient(90deg, transparent, rgba(217,179,106,.45), transparent);
        opacity: .75;
        animation: shimmer 2.2s ease-in-out infinite;
        margin-bottom: 12px;
      }
      @keyframes shimmer{
        0%{ transform: translateX(-22%); opacity: .35 }
        45%{ opacity: .85 }
        100%{ transform: translateX(22%); opacity: .35 }
      }

      .gate-title{
        margin: 2px 0 10px;
        font-size: clamp(18px, 4.4vw, 22px);
        letter-spacing: .2px;
      }
      .gate-subtitle{
        margin: 0 0 14px;
        color: rgba(246,231,255,.78);
        font-size: 13.5px;
        line-height: 1.5;
      }

      .field{
        display: grid;
        gap: 10px;
        align-items: center;
        justify-items: center;
        width: 100%;
      }
      label{
        width: 100%;
        text-align: left;
        color: rgba(246,231,255,.86);
        font-size: 13.5px;
        padding-left: 4px;
      }

      input[type="password"]{
        width: 100%;
        max-width: 360px;
        height: 46px;
        border-radius: 12px;
        padding: 0 14px;
        border: 1px solid rgba(217,179,106,.28);
        background: rgba(0,0,0,.22);
        color: rgba(246,231,255,.96);
        outline: none;
        font-size: 16px; /* prevent iOS zoom */
        box-shadow:
          0 12px 25px rgba(0,0,0,.22),
          0 0 0 1px rgba(255,255,255,.02) inset;
        transition: box-shadow .2s ease, border-color .2s ease, transform .2s ease;
      }
      input[type="password"]:focus{
        border-color: rgba(217,179,106,.55);
        box-shadow:
          0 14px 34px rgba(0,0,0,.30),
          0 0 0 4px rgba(217,179,106,.18);
      }
      .err{
        height: 18px;
        font-size: 13px;
        color: rgba(255,107,134,.95);
        opacity: 0;
        transform: translateY(-2px);
        transition: opacity .22s ease, transform .22s ease;
        will-change: opacity, transform;
      }
      .err.on{
        opacity: 1;
        transform: translateY(0);
      }

      .btn-row{
        display: flex;
        gap: 10px;
        justify-content: center;
        flex-wrap: wrap;
        margin-top: 8px;
      }

      .btn{
        appearance: none;
        border: 1px solid rgba(217,179,106,.35);
        background: linear-gradient(180deg, rgba(217,179,106,.26), rgba(217,179,106,.12));
        color: rgba(246,231,255,.96);
        border-radius: 14px;
        height: 44px;
        padding: 0 16px;
        font-weight: 650;
        letter-spacing: .2px;
        cursor: pointer;
        box-shadow:
          0 16px 38px rgba(0,0,0,.25),
          0 0 0 1px rgba(255,255,255,.04) inset;
        transition: transform .15s ease, box-shadow .2s ease, border-color .2s ease, filter .2s ease;
      }
      .btn:hover{ transform: translateY(-1px); border-color: rgba(217,179,106,.6); }
      .btn:active{ transform: translateY(0); filter: brightness(1.02); }
      .btn:focus-visible{
        outline: none;
        box-shadow:
          0 16px 38px rgba(0,0,0,.25),
          0 0 0 4px rgba(217,179,106,.22);
      }

      .shake{
        animation: shake .35s ease-in-out 1;
      }
      @keyframes shake{
        0%{ transform: translateX(0) }
        20%{ transform: translateX(-6px) }
        40%{ transform: translateX(6px) }
        60%{ transform: translateX(-4px) }
        80%{ transform: translateX(4px) }
        100%{ transform: translateX(0) }
      }

      .fade-out{ animation: fadeOut .45s ease forwards; }
      .fade-in{ animation: fadeIn .6s ease forwards; }
      @keyframes fadeOut{
        from{ opacity: 1; transform: translateY(0) scale(1) }
        to{ opacity: 0; transform: translateY(8px) scale(.99) }
      }
      @keyframes fadeIn{
        from{ opacity: 0; transform: translateY(10px) scale(.995) }
        to{ opacity: 1; transform: translateY(0) scale(1) }
      }

      /* Safe stage */
      .safe-stage{
        width: 100%;
        max-width: calc(var(--safeW) + 80px);
        display: grid;
        place-items: center;
        gap: 14px;
      }
      .safe-title{
        margin: 0;
        font-size: 13px;
        color: rgba(246,231,255,.75);
        letter-spacing: .24px;
      }

      .safe-wrap{
        width: var(--safeW);
        height: var(--safeH);
        position: relative;
        display: grid;
        place-items: center;
        transform: translateZ(0);
      }

      .safe{
        position: absolute;
        inset: 0;
        border-radius: 22px;
        transform-style: preserve-3d;
        filter: drop-shadow(0 45px 55px rgba(0,0,0,.55));
      }

      .safe__body{
        position: absolute;
        inset: 0;
        border-radius: 22px;
        background:
          linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.02) 30%, rgba(0,0,0,.25)),
          radial-gradient(800px 260px at 50% 0%, rgba(217,179,106,.18), transparent 55%),
          linear-gradient(135deg, rgba(217,179,106,.12), rgba(80,30,120,.05));
        border: 1px solid rgba(217,179,106,.22);
        box-shadow:
          0 0 0 1px rgba(255,255,255,.04) inset,
          0 -30px 90px rgba(0,0,0,.35) inset;
        overflow: hidden;
      }

      .safe__body::before{
        content:"";
        position:absolute;
        inset:-40% -40%;
        background:
          repeating-linear-gradient(
            100deg,
            rgba(255,255,255,.06) 0px,
            rgba(255,255,255,.02) 22px,
            rgba(0,0,0,.06) 44px
          );
        opacity: .35;
        transform: rotate(10deg);
      }

      .safe__rim{
        position:absolute;
        left: 7%;
        right: 7%;
        top: 10%;
        height: 80%;
        border-radius: 18px;
        border: 1px solid rgba(217,179,106,.22);
        background: rgba(0,0,0,.10);
      }

      .door{
        position:absolute;
        left: 8%;
        right: 8%;
        top: 16%;
        bottom: 16%;
        border-radius: 18px;
        transform-origin: left center;
        transform: perspective(800px) rotateY(-10deg);
        transition: transform 1.35s cubic-bezier(.2,.8,.2,1), filter 1.2s ease;
        background:
          radial-gradient(900px 280px at 30% 20%, rgba(217,179,106,.18), transparent 45%),
          linear-gradient(180deg, rgba(255,255,255,.09), rgba(255,255,255,.02) 30%, rgba(0,0,0,.28)),
          linear-gradient(135deg, rgba(90,30,140,.08), rgba(217,179,106,.10));
        border: 1px solid rgba(217,179,106,.28);
        box-shadow:
          -12px 0 30px rgba(0,0,0,.35),
          0 0 0 1px rgba(255,255,255,.04) inset;
        overflow: hidden;
      }

      .door::after{
        content:"";
        position:absolute;
        inset: -20%;
        background:
          repeating-linear-gradient(
            90deg,
            rgba(255,255,255,.05) 0px,
            rgba(255,255,255,.01) 14px,
            rgba(0,0,0,.05) 30px
          );
        opacity: .35;
        transform: rotate(-8deg);
      }

      .dial{
        position:absolute;
        left: 58%;
        top: 44%;
        width: 66px;
        height: 66px;
        border-radius: 999px;
        border: 1px solid rgba(217,179,106,.35);
        background:
          radial-gradient(circle at 35% 30%, rgba(255,255,255,.18), rgba(255,255,255,.02) 35%, rgba(0,0,0,.25) 70%),
          linear-gradient(180deg, rgba(217,179,106,.18), rgba(0,0,0,.22));
        box-shadow:
          0 0 0 1px rgba(255,255,255,.05) inset,
          0 14px 30px rgba(0,0,0,.25);
      }
      .dial::before{
        content:"";
        position:absolute;
        inset: 10px;
        border-radius: 999px;
        border: 1px dashed rgba(217,179,106,.40);
        opacity: .65;
      }
      .dial::after{
        content:"";
        position:absolute;
        width: 2px;
        height: 26px;
        left: 50%;
        top: 50%;
        transform-origin: bottom center;
        background: rgba(217,179,106,.85);
        border-radius: 2px;
        transform: translate(-50%, -100%) rotate(18deg);
        box-shadow: 0 0 14px rgba(217,179,106,.35);
      }

      .bore{
        position:absolute;
        left: 16%;
        right: 16%;
        top: 27%;
        height: 48%;
        border-radius: 14px;
        background:
          radial-gradient(450px 220px at 50% 0%, rgba(0,0,0,.4), rgba(0,0,0,.72) 55%, rgba(0,0,0,.88)),
          radial-gradient(380px 220px at 50% 30%, rgba(217,179,106,.13), transparent 55%);
        border: 1px solid rgba(255,255,255,.06);
        overflow: hidden;
      }

      .open-glow{
        position:absolute;
        left: 14%;
        right: 14%;
        top: 14%;
        bottom: 14%;
        border-radius: 18px;
        background: radial-gradient(circle at 50% 18%, rgba(217,179,106,.25), transparent 55%);
        opacity: 0;
        transform: scale(.98);
        transition: opacity .7s ease, transform .7s ease;
        pointer-events:none;
      }

      .letter-wrap{
        position:absolute;
        left: 50%;
        top: 62%;
        transform: translate(-50%, -50%);
        width: min(92%, 340px);
        height: 220px;
        pointer-events: auto;
      }
      .letter{
        width: 100%;
        height: 100%;
        border: 0;
        background: transparent;
        padding: 0;
        pointer-events: none;
        cursor: pointer;
        transform: translateY(16px) scale(.92) rotateX(14deg);
        opacity: 0;
        filter: blur(2px) saturate(1.05);
        transition: opacity .65s ease, transform .85s cubic-bezier(.2,.8,.2,1), filter .85s ease;
        transform-style: preserve-3d;
      }
      .letter:disabled{ cursor: default; }
      .letter:focus-visible{ outline: none; }

      .envelope{
        position:absolute;
        inset: 0;
        border-radius: 18px;
        background:
          linear-gradient(180deg, rgba(255,255,255,.10), rgba(255,255,255,.04)),
          radial-gradient(520px 220px at 50% 0%, rgba(217,179,106,.18), transparent 56%),
          linear-gradient(135deg, rgba(180,120,255,.08), rgba(0,0,0,.25));
        border: 1px solid rgba(217,179,106,.22);
        box-shadow:
          0 35px 70px rgba(0,0,0,.38),
          0 0 0 1px rgba(255,255,255,.04) inset;
        overflow: hidden;
        transform: translateZ(0);
      }

      .flap{
        position:absolute;
        left: 12%;
        right: 12%;
        top: 42%;
        height: 44%;
        transform-origin: top center;
        background: linear-gradient(180deg, rgba(255,255,255,.08), rgba(0,0,0,.16));
        clip-path: polygon(0% 100%, 50% 0%, 100% 100%);
        border-top: 1px solid rgba(217,179,106,.22);
        transition: transform .75s cubic-bezier(.2,.8,.2,1), opacity .45s ease;
        transform: translateY(-2px) rotateX(0deg);
        opacity: 1;
      }

      .envelope__front{
        position:absolute;
        inset: 0;
      }

      .seal{
        position:absolute;
        width: 44px;
        height: 44px;
        border-radius: 999px;
        left: 50%;
        top: 28%;
        transform: translate(-50%, -50%);
        background:
          radial-gradient(circle at 30% 25%, rgba(255,255,255,.22), rgba(255,255,255,.05) 35%, transparent 55%),
          radial-gradient(circle at 55% 60%, rgba(0,0,0,.20), transparent 52%),
          linear-gradient(180deg, #c43a5c, #6f1732);
        box-shadow:
          0 16px 35px rgba(0,0,0,.35),
          0 0 20px rgba(255,80,140,.18);
        border: 1px solid rgba(255, 190, 206, .18);
      }
      .seal::before{
        content:"";
        position:absolute;
        inset: 10px;
        border-radius: 999px;
        border: 1px dashed rgba(255, 220, 235, .35);
        opacity: .75;
      }
      .seal::after{
        content:"LOVE";
        position:absolute;
        inset: 0;
        display:grid;
        place-items:center;
        font-size: 16px;
        color: rgba(255, 235, 245, .92);
        text-shadow: 0 0 14px rgba(255,235,245,.12);
      }

      .hand{
        position:absolute;
        left: 50%;
        top: 58%;
        transform: translate(-50%, -50%);
        width: 82%;
        text-align: center;
        font-family: "Brush Script MT", "Segoe Script", "Apple Chancery", "Snell Roundhand", cursive;
        font-size: clamp(20px, 6vw, 30px);
        color: rgba(245, 224, 255, .96);
        text-shadow:
          0 0 18px rgba(217,179,106,.16),
          0 0 1px rgba(255,255,255,.10);
        letter-spacing: .2px;
        user-select: none;
        line-height: 1.05;
      }
      .hand .thin{
        display:block;
        font-size: .74em;
        color: rgba(203, 182, 230, .92);
        text-shadow: 0 0 12px rgba(217,179,106,.10);
      }

      .paper{
        position:absolute;
        left: 12%;
        right: 12%;
        bottom: 10%;
        height: 46%;
        border-radius: 12px;
        background:
          linear-gradient(180deg, rgba(255,255,255,.18), rgba(255,255,255,.05)),
          radial-gradient(360px 140px at 50% 0%, rgba(217,179,106,.20), transparent 55%);
        border: 1px solid rgba(217,179,106,.16);
        box-shadow:
          0 20px 55px rgba(0,0,0,.18),
          0 0 0 1px rgba(255,255,255,.05) inset;
        transform: translateY(30px) scale(.98);
        opacity: 0;
        transition: transform .75s cubic-bezier(.2,.8,.2,1), opacity .45s ease;
      }

      /* Unlocked states */
      body[data-state="unlocked"] .open-glow{ opacity: 1; transform: scale(1); }
      body[data-state="unlocked"] .door{ transform: perspective(800px) rotateY(86deg) translateX(6px); filter: saturate(1.08); }
      body[data-state="unlocked"] .letter{
        opacity: 1;
        pointer-events: auto;
        transform: translateY(-18px) scale(1) rotateX(0deg);
        filter: blur(0px) saturate(1.12);
      }
      body[data-state="unlocked"] .safe{
        filter: drop-shadow(0 55px 65px rgba(0,0,0,.62)) drop-shadow(0 0 55px rgba(217,179,106,.16));
      }

      body[data-state="letter-open"] .flap{
        transform: rotateX(66deg) translateY(-2px);
        opacity: .98;
      }
      body[data-state="letter-open"] .paper{
        transform: translateY(-22px) scale(1);
        opacity: 1;
      }

      /* =============================================
         VIDEO MODAL — funziona su iOS, Android, Desktop
         ============================================= */
      .video-modal{
        display: none;
        position: fixed;
        inset: 0;
        z-index: 100;
        background: rgba(0,0,0,0);
        transition: background .35s ease;
        align-items: center;
        justify-content: center;
        padding: env(safe-area-inset-top, 0) env(safe-area-inset-right, 0) env(safe-area-inset-bottom, 0) env(safe-area-inset-left, 0);
      }
      .video-modal.active{
        display: flex;
        background: rgba(0,0,0,.88);
      }
      .video-modal.visible{
        background: rgba(0,0,0,.92);
      }

      .video-modal__inner{
        position: relative;
        width: 100%;
        height: 100%;
        max-width: 100vw;
        max-height: 100dvh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 12px;
        padding: 0;
      }

      /* Il video occupa tutto lo schermo su mobile */
      .video-modal video{
        display: block;
        width: 100%;
        height: 100%;
        max-width: 100vw;
        max-height: 100dvh;
        object-fit: contain;
        background: #000;
        border-radius: 0;
      }

      /* Su schermi più grandi: arrotondato e con padding */
      @media (min-width: 600px){
        .video-modal__inner{
          padding: 20px;
          max-width: 860px;
          margin: 0 auto;
        }
        .video-modal video{
          border-radius: 16px;
          max-height: calc(100dvh - 80px);
          border: 1px solid rgba(217,179,106,.22);
          box-shadow: 0 40px 100px rgba(0,0,0,.65);
        }
      }

      /* Bottone chiudi */
      .video-modal__close{
        position: fixed;
        top: max(14px, env(safe-area-inset-top, 14px));
        right: max(14px, env(safe-area-inset-right, 14px));
        z-index: 110;
        appearance: none;
        width: 44px;
        height: 44px;
        border-radius: 999px;
        border: 1px solid rgba(217,179,106,.45);
        background: rgba(5,2,5,.75);
        color: rgba(246,231,255,.96);
        font-size: 20px;
        line-height: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        box-shadow: 0 8px 28px rgba(0,0,0,.45);
        transition: transform .15s ease, background .15s ease;
        -webkit-tap-highlight-color: transparent;
      }
      .video-modal__close:active{ transform: scale(.93); }

      /* Overlay play button */
      .video-modal__play{
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: rgba(0,0,0,.38);
        border-radius: inherit;
        opacity: 0;
        transition: opacity .25s ease;
        pointer-events: none;
      }
      .video-modal__play.on{
        opacity: 1;
        pointer-events: auto;
      }
      .play-circle{
        width: 72px;
        height: 72px;
        border-radius: 999px;
        border: 2px solid rgba(217,179,106,.65);
        background: rgba(5,2,5,.62);
        display: flex;
        align-items: center;
        justify-content: center;
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        box-shadow: 0 0 40px rgba(217,179,106,.22);
        cursor: pointer;
        -webkit-tap-highlight-color: transparent;
        transition: transform .15s ease;
      }
      .play-circle:active{ transform: scale(.92); }
      .play-tri{
        width: 0; height: 0;
        border-left: 24px solid rgba(246,231,255,.96);
        border-top: 14px solid transparent;
        border-bottom: 14px solid transparent;
        margin-left: 5px;
        filter: drop-shadow(0 0 10px rgba(217,179,106,.35));
      }

      /* Spinner caricamento */
      .video-modal__loading{
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 12px;
        pointer-events: none;
      }
      .video-modal__loading.off{ display: none; }
      .spinner{
        width: 48px;
        height: 48px;
        border-radius: 999px;
        border: 2px solid rgba(217,179,106,.22);
        border-top-color: rgba(217,179,106,.90);
        animation: spin 1s linear infinite;
        box-shadow: 0 0 24px rgba(217,179,106,.20);
      }
      @keyframes spin{ to{ transform: rotate(360deg) } }
      .loading-text{
        font-size: 14px;
        color: rgba(246,231,255,.75);
        letter-spacing: .18px;
      }

      /* Reduced motion */
      @media (prefers-reduced-motion: reduce){
        .ambient::before, .ambient::after, .gate-shimmer{ animation: none !important; }
        .shake{ animation: none !important; }
        .fade-out, .fade-in{ animation: none !important; }
        .spinner{ animation: none !important; }
      }

      @media (max-width: 420px){
        :root{ --safeH: clamp(210px, 68vw, 340px); }
      }
    </style>
  </head>
  <body data-state="gate">
    <canvas id="bgCanvas" aria-hidden="true"></canvas>
    <div class="ambient" aria-hidden="true"></div>
    <div class="grain" aria-hidden="true"></div>

    <div class="app">
      <!-- Password gate -->
      <section class="scene" id="gateScene" aria-label="Password gate">
        <div class="gate-card" id="gateCard" role="region" aria-describedby="gateErrorText">
          <div class="gate-shimmer" aria-hidden="true"></div>
          <h1 class="gate-title">Inserisci La Combinazione</h1>
          <p class="gate-subtitle" id="gateSub">
            ❤️❤️❤️❤️❤️❤️❤️❤️
          </p>

          <form class="field" id="gateForm" autocomplete="off">
            <label for="passwordInput">Password</label>
            <input
              id="passwordInput"
              name="password"
              type="password"
              inputmode="text"
              autocomplete="off"
              required
              minlength="1"
              maxlength="64"
              aria-label="Inserisci la password"
            />
            <div class="err" id="gateErrorText" aria-live="polite"></div>

            <div class="btn-row">
              <button class="btn" type="submit" id="unlockBtn">Sblocca</button>
            </div>
          </form>
        </div>
      </section>

      <!-- Safe scene -->
      <section class="safe-stage hidden" id="safeScene" aria-label="Safe scene">
        <p class="safe-title"></p>

        <div class="safe-wrap">
          <div class="safe" aria-hidden="true">
            <div class="safe__body"></div>
            <div class="safe__rim"></div>
            <div class="open-glow"></div>
            <div class="bore"></div>

            <div class="door" id="door">
              <div class="dial"></div>
            </div>

            <div class="letter-wrap" aria-hidden="false">
              <button
                class="letter"
                id="letterButton"
                type="button"
                aria-label="Apri la lettera segreta"
              >
                <div class="envelope">
                  <div class="envelope__front">
                    <div class="seal" aria-hidden="true"></div>
                    <div class="hand" aria-hidden="true">
                      <span class="thin" id="handLine1">Per te</span>
                      <span id="handLine2">Amore mio</span>
                    </div>
                  </div>
                  <div class="flap" aria-hidden="true"></div>
                  <div class="paper" aria-hidden="true"></div>
                </div>
              </button>
            </div>
          </div>
        </div>
      </section>
    </div>

    <!-- VIDEO MODAL — separato dal DOM della cassaforte, copre tutto lo schermo -->
    <div class="video-modal" id="videoModal" role="dialog" aria-modal="true" aria-label="Video segreto">
      <button class="video-modal__close" id="modalCloseBtn" type="button" aria-label="Chiudi video">✕</button>

      <div class="video-modal__inner">
        <div style="position:relative; width:100%; height:100%; display:flex; align-items:center; justify-content:center;">
          <video
            id="secretVideo"
            playsinline
            webkit-playsinline
            x5-playsinline
            preload="metadata"
            aria-label="Video segreto"
          >
            <!-- Cambia src con il percorso del tuo video -->
            <source id="videoSource" src="Should Cat Build A Pickup Truck.mp4" type="video/mp4" />
          </video>

          <!-- Loading spinner -->
          <div class="video-modal__loading" id="videoLoading">
            <div class="spinner" aria-hidden="true"></div>
            <div class="loading-text">La lettera si sta aprendo…</div>
          </div>

          <!-- Overlay play manuale (fallback se autoplay bloccato) -->
          <div class="video-modal__play" id="videoPlayOverlay" aria-hidden="true">
            <div class="play-circle" id="videoPlayBtn" role="button" tabindex="0" aria-label="Riproduci video">
              <div class="play-tri" aria-hidden="true"></div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script>
      /***********************
       * CONFIG
       ***********************/
      const PASSWORD   = "010226";
      const VIDEO_SRC  = "Should Cat Build A Pickup Truck.mp4";
      const LETTER_TEXT = { line1: "Per te", line2: "Amore mio" };

      /***********************
       * Elementi
       ***********************/
      const body            = document.body;
      const gateScene       = document.getElementById("gateScene");
      const safeScene       = document.getElementById("safeScene");
      const gateCard        = document.getElementById("gateCard");
      const gateForm        = document.getElementById("gateForm");
      const unlockBtn       = document.getElementById("unlockBtn");
      const passwordInput   = document.getElementById("passwordInput");
      const gateErrorText   = document.getElementById("gateErrorText");
      const letterButton    = document.getElementById("letterButton");
      const videoModal      = document.getElementById("videoModal");
      const secretVideo     = document.getElementById("secretVideo");
      const videoSource     = document.getElementById("videoSource");
      const videoLoading    = document.getElementById("videoLoading");
      const videoPlayOverlay= document.getElementById("videoPlayOverlay");
      const videoPlayBtn    = document.getElementById("videoPlayBtn");
      const modalCloseBtn   = document.getElementById("modalCloseBtn");
      const handLine1       = document.getElementById("handLine1");
      const handLine2       = document.getElementById("handLine2");

      handLine1.textContent = LETTER_TEXT.line1;
      handLine2.textContent = LETTER_TEXT.line2;

      /* Normalizza percorsi Windows */
      function normalizeUrl(s){
        const input = String(s || "").trim();
        if (/^[a-zA-Z]:[\\/]/.test(input)){
          return "file:///" + input.replace(/\\/g, "/");
        }
        return input;
      }

      /* Imposta src video */
      const rawSrc = (VIDEO_SRC || "").trim() || videoSource.getAttribute("src") || "";
      videoSource.src = normalizeUrl(rawSrc);

      /***********************
       * Stato
       ***********************/
      const state = { unlocked: false, letterOpened: false };

      function setState(next){ body.setAttribute("data-state", next); }
      function setGateError(msg){
        gateErrorText.textContent = msg || "";
        gateErrorText.classList.toggle("on", Boolean(msg));
      }
      function lockGate(locked){
        unlockBtn.disabled = locked;
        passwordInput.disabled = locked;
      }

      /***********************
       * Gate → Safe
       ***********************/
      function revealSafe(){
        safeScene.classList.remove("hidden");
        safeScene.classList.add("fade-in");
        gateScene.classList.add("fade-out");
        gateScene.style.pointerEvents = "none";
        gateScene.setAttribute("aria-hidden", "true");

        setTimeout(() => {
          state.unlocked = true;
          letterButton.disabled = false;
          setState("unlocked");
        }, 280);
      }

      gateForm.addEventListener("submit", (e) => {
        e.preventDefault();
        const entered = String(passwordInput.value || "");
        if (entered === PASSWORD){
          setGateError("");
          lockGate(true);
          revealSafe();
          setTimeout(() => letterButton.focus({ preventScroll: true }), 900);
          return;
        }
        lockGate(false);
        passwordInput.value = "";
        passwordInput.focus();
        gateCard.classList.remove("shake");
        void gateCard.offsetWidth;
        gateCard.classList.add("shake");
        setGateError("Non è questa… riprova con calma.");
      });

      /***********************
       * Modal video
       ***********************/
      function openModal(){
        videoModal.classList.add("active");
        /* Piccolo rAF per triggerare la transizione opacità */
        requestAnimationFrame(() => {
          requestAnimationFrame(() => videoModal.classList.add("visible"));
        });
        document.body.style.overflow = "hidden";
        modalCloseBtn.focus({ preventScroll: true });
        attemptPlay();
      }

      function closeModal(){
        secretVideo.pause();
        secretVideo.currentTime = 0;
        videoModal.classList.remove("visible");
        document.body.style.overflow = "";

        /* Esci da fullscreen se attivo */
        try{
          if (document.fullscreenElement) document.exitFullscreen().catch(()=>{});
          if (document.webkitFullscreenElement) document.webkitExitFullscreen?.();
        }catch(_){}

        setTimeout(() => {
          videoModal.classList.remove("active");
          /* Reset UI */
          videoLoading.classList.remove("off");
          videoPlayOverlay.classList.remove("on");
          videoPlayOverlay.setAttribute("aria-hidden","true");
          state.letterOpened = false;
        }, 350);
      }

      modalCloseBtn.addEventListener("click", closeModal);

      /* Chiudi anche con Escape */
      document.addEventListener("keydown", (e) => {
        if (e.key === "Escape" && videoModal.classList.contains("active")) closeModal();
      });

      /***********************
       * Riproduzione video
       ***********************/
      async function attemptPlay(){
        videoLoading.classList.remove("off");
        videoPlayOverlay.classList.remove("on");
        videoPlayOverlay.setAttribute("aria-hidden","true");

        try {
          secretVideo.muted = false;
          await secretVideo.play();
        } catch(_) {
          /* Secondo tentativo: muted (alcuni browser lo richiedono) */
          try {
            secretVideo.muted = true;
            await secretVideo.play();
          } catch(__) {
            /* Autoplay bloccato: mostra pulsante manuale */
            showPlayBtn();
          }
        }
      }

      function showPlayBtn(){
        videoLoading.classList.add("off");
        videoPlayOverlay.classList.add("on");
        videoPlayOverlay.setAttribute("aria-hidden","false");
        /* Su iOS mostra i controlli nativi come fallback aggiuntivo */
        secretVideo.controls = true;
      }

      /* Video pronto */
      secretVideo.addEventListener("loadeddata", () => {
        videoLoading.classList.add("off");
      });
      secretVideo.addEventListener("canplay", () => {
        videoLoading.classList.add("off");
      });
      secretVideo.addEventListener("playing", () => {
        videoLoading.classList.add("off");
        videoPlayOverlay.classList.remove("on");
        videoPlayOverlay.setAttribute("aria-hidden","true");
        secretVideo.controls = false;
      });
      secretVideo.addEventListener("error", () => {
        showPlayBtn();
      });
      secretVideo.addEventListener("waiting", () => {
        videoLoading.classList.remove("off");
      });

      /* Pulsante play manuale */
      function handleManualPlay(){
        videoPlayOverlay.classList.remove("on");
        videoPlayOverlay.setAttribute("aria-hidden","true");
        secretVideo.controls = false;
        secretVideo.muted = false;
        secretVideo.play().catch(() => {
          secretVideo.controls = true;
          videoPlayOverlay.classList.add("on");
          videoPlayOverlay.setAttribute("aria-hidden","false");
        });

        /* Tenta fullscreen anche qui (Android) */
        tryNativeFullscreen();
      }
      videoPlayBtn.addEventListener("click", handleManualPlay);
      videoPlayBtn.addEventListener("keydown", (e) => {
        if (e.key === "Enter" || e.key === " ") { e.preventDefault(); handleManualPlay(); }
      });

      /* Fullscreen nativo — solo su Android/Desktop dove funziona */
      function tryNativeFullscreen(){
        const el = secretVideo;
        try {
          const req = el.requestFullscreen || el.webkitRequestFullscreen || el.msRequestFullscreen;
          if (typeof req === "function") req.call(el).catch(()=>{});
        } catch(_){}
      }

      /***********************
       * Click sulla lettera
       ***********************/
      letterButton.addEventListener("click", () => {
        if (!state.unlocked || state.letterOpened) return;
        state.letterOpened = true;
        setState("letter-open");

        /* Ritardo breve: l'animazione della busta si vede prima dell'apertura modale */
        setTimeout(() => {
          openModal();
          /* Su Android Chrome il fullscreen richiede un gesto utente diretto */
          tryNativeFullscreen();
        }, 380);
      });

      letterButton.disabled = true;

      /***********************
       * Background particles
       ***********************/
      (function initParticles(){
        const canvas = document.getElementById("bgCanvas");
        const ctx = canvas.getContext("2d", { alpha: true });
        let w = 0, h = 0;
        const DPR = Math.min(2, window.devicePixelRatio || 1);
        let particles = [];

        function resize(){
          w = window.innerWidth;
          h = window.innerHeight;
          canvas.width = Math.floor(w * DPR);
          canvas.height = Math.floor(h * DPR);
          canvas.style.width = w + "px";
          canvas.style.height = h + "px";
          ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
          spawn();
        }

        function spawn(){
          const count = Math.round(Math.min(90, Math.max(40, (w * h) / 18000)));
          particles = new Array(count).fill(0).map(() => {
            const r = Math.random();
            const size = 0.6 + Math.random() * 1.8;
            return {
              x: Math.random() * w,
              y: Math.random() * h,
              vx: (Math.random() - .5) * (0.08 + r * 0.12),
              vy: (Math.random() - .5) * (0.06 + r * 0.10),
              a: 0.10 + Math.random() * 0.35,
              size,
              hue: 40 + Math.random() * 260,
              tw: 0.6 + Math.random() * 1.8
            };
          });
        }

        let t0 = performance.now();
        function frame(now){
          const dt = Math.min(32, now - t0);
          t0 = now;
          ctx.clearRect(0,0,w,h);

          const g = ctx.createRadialGradient(w*0.5, h*0.2, 40, w*0.5, h*0.35, Math.max(w,h)*0.85);
          g.addColorStop(0, "rgba(217,179,106,0.10)");
          g.addColorStop(0.5, "rgba(160,90,255,0.05)");
          g.addColorStop(1, "rgba(0,0,0,0)");
          ctx.fillStyle = g;
          ctx.fillRect(0,0,w,h);

          for (const p of particles){
            p.x += p.vx * dt;
            p.y += p.vy * dt;
            if (p.x < -10) p.x = w + 10;
            if (p.x > w + 10) p.x = -10;
            if (p.y < -10) p.y = h + 10;
            if (p.y > h + 10) p.y = -10;

            const twinkle = 0.65 + 0.35 * Math.sin((now/1000) * p.tw + p.x * 0.01);
            const alpha = p.a * twinkle;

            ctx.beginPath();
            ctx.fillStyle = `hsla(${p.hue}, 85%, 70%, ${alpha})`;
            ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
            ctx.fill();
          }
          requestAnimationFrame(frame);
        }

        window.addEventListener("resize", resize, { passive: true });
        resize();
        requestAnimationFrame(frame);
      })();
    </script>
  </body>
</html>
