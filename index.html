<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
  <meta name="color-scheme" content="dark"/>
  <title>Per Te</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=Dancing+Script:wght@400;600&family=Montserrat:wght@200;300;400&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg:      #08060a;
      --copper:  #b87333;
      --copper2: #d4956a;
      --copper3: #7a4520;
      --cream:   #f5e8d3;
      --cream2:  #c9b49a;
      --wine:    #6b1f3a;
      --wine2:   #9c2d52;
      --fs:      'Cormorant Garamond', Georgia, serif;
      --fsc:     'Dancing Script', cursive;
      --fsn:     'Montserrat', sans-serif;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    html,body{height:100%;overflow:hidden;}
    body{font-family:var(--fs);background:var(--bg);color:var(--cream);display:grid;place-items:center;}

    #bgc{position:fixed;inset:0;width:100%;height:100%;pointer-events:none;z-index:0;}
    .vignette{position:fixed;inset:0;z-index:1;pointer-events:none;
      background:radial-gradient(ellipse 85% 85% at 50% 50%, transparent 25%, rgba(8,6,10,.88) 100%);}

    #stage{position:relative;z-index:2;width:100vw;height:100dvh;display:grid;place-items:center;}

    .screen{position:absolute;inset:0;display:grid;place-items:center;
      opacity:0;pointer-events:none;
      transition:opacity .55s ease, transform .55s cubic-bezier(.4,0,.2,1);
      transform:scale(.96);}
    .screen.active{opacity:1;pointer-events:auto;transform:scale(1);}
    .screen.exit{opacity:0;transform:scale(1.03);pointer-events:none;}

    /* ── SCREEN 1: SAFE ── */
    #sc-safe{flex-direction:column;}

    .hint{
      font-family:var(--fsn);font-weight:300;
      font-size:clamp(11px,3.2vw,14px);letter-spacing:.32em;text-transform:uppercase;
      color:rgba(212,149,106,.88);
      text-shadow:0 0 20px rgba(184,115,51,.4);
      opacity:0;animation:fadeUp .7s ease 1s forwards;
    }
    @keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

    .safe3d{
      position:relative;
      width:clamp(260px,75vw,340px);height:clamp(260px,75vw,340px);
      cursor:pointer;transform-style:preserve-3d;
      transition:transform .3s ease;
      -webkit-tap-highlight-color:transparent;
    }
    .safe3d:hover{transform:scale(1.03) rotateY(-4deg) rotateX(2deg);}
    .safe3d:active{transform:scale(.96);}

    /* Corpo esterno — metallo spesso con bordo rinforzato */
    .s-body{
      position:absolute;inset:0;border-radius:16px;
      background:
        radial-gradient(circle at 28% 18%, rgba(100,72,42,.7) 0%, transparent 42%),
        radial-gradient(circle at 75% 80%, rgba(40,25,10,.8) 0%, transparent 40%),
        linear-gradient(160deg,#2e2010 0%,#1c1208 35%,#120c06 70%,#0e0906 100%);
      border:2px solid rgba(184,115,51,.45);
      box-shadow:
        0 0 0 4px rgba(10,7,4,.9),
        0 0 0 6px rgba(184,115,51,.22),
        0 60px 130px rgba(0,0,0,.9),
        0 0 80px rgba(184,115,51,.07),
        inset 0 2px 0 rgba(212,149,106,.25),
        inset 0 0 0 1px rgba(255,255,255,.04);
      overflow:hidden;
    }
    /* Texture metallo spazzolato */
    .s-body::before{
      content:'';position:absolute;inset:0;
      background:
        repeating-linear-gradient(92deg,rgba(255,255,255,.018) 0,rgba(255,255,255,.018) 1px,transparent 1px,transparent 4px),
        repeating-linear-gradient(180deg,rgba(255,255,255,.009) 0,rgba(255,255,255,.009) 1px,transparent 1px,transparent 6px);
      border-radius:14px;
    }
    /* Ombra interna bordo */
    .s-body::after{
      content:'';position:absolute;inset:0;border-radius:14px;
      box-shadow:inset 3px 3px 10px rgba(0,0,0,.55),inset -2px -2px 8px rgba(0,0,0,.45);
      pointer-events:none;
    }

    /* Cornice interna rinforzata */
    .s-rim{
      position:absolute;inset:10px;border-radius:10px;
      border:2px solid rgba(184,115,51,.32);
      box-shadow:inset 0 0 0 1px rgba(0,0,0,.6),0 0 0 1px rgba(255,255,255,.03);
      pointer-events:none;
    }
    .s-rim::before{
      content:'';position:absolute;inset:5px;border-radius:7px;
      border:1px solid rgba(184,115,51,.14);
    }

    /* Sportello — pannello incassato con effetto profondità */
    .s-door-panel{
      position:absolute;
      left:18%;right:8%;top:12%;bottom:12%;
      border-radius:10px;
      background:
        radial-gradient(circle at 30% 25%, rgba(90,62,32,.5), transparent 55%),
        linear-gradient(160deg,#221608,#160e05,#0e0903);
      border:1px solid rgba(184,115,51,.3);
      box-shadow:
        inset 0 2px 4px rgba(0,0,0,.7),
        inset 0 -1px 2px rgba(255,255,255,.04),
        2px 4px 12px rgba(0,0,0,.5);
    }
    .s-door-panel::before{
      content:'';position:absolute;inset:0;border-radius:9px;
      background:repeating-linear-gradient(92deg,rgba(255,255,255,.016) 0,rgba(255,255,255,.016) 1px,transparent 1px,transparent 4px);
    }

    /* Cerniere — 3 cerniere sul lato sinistro */
    .s-hinges{
      position:absolute;left:14%;top:0;bottom:0;
      display:flex;flex-direction:column;justify-content:space-around;
      padding:20% 0;pointer-events:none;
    }
    .s-hinge{
      width:clamp(10px,2.5vw,14px);height:clamp(22px,5.5vw,28px);
      background:linear-gradient(90deg,rgba(60,40,18,.9),rgba(130,90,40,.95),rgba(184,115,51,.85),rgba(130,90,40,.95),rgba(60,40,18,.9));
      border-radius:4px;
      border:1px solid rgba(212,149,106,.35);
      box-shadow:2px 0 6px rgba(0,0,0,.6),inset 0 1px 0 rgba(255,255,255,.15),inset 0 -1px 0 rgba(0,0,0,.4);
      position:relative;
    }
    .s-hinge::before{
      content:'';position:absolute;inset:3px 2px;border-radius:2px;
      background:linear-gradient(90deg,rgba(0,0,0,.3),rgba(255,255,255,.08),rgba(0,0,0,.3));
    }

    /* Targa incisa sul pannello */
    .s-plaque{
      position:absolute;left:50%;top:32%;transform:translate(-30%,-50%);text-align:center;
    }
    .s-title{font-family:var(--fsc);font-size:clamp(18px,5vw,26px);color:var(--copper2);
      text-shadow:0 0 28px rgba(184,115,51,.45),0 2px 5px rgba(0,0,0,.8);}
    .s-sub{font-family:var(--fsn);font-weight:200;font-size:clamp(6px,1.5vw,8px);
      letter-spacing:.35em;text-transform:uppercase;color:rgba(184,115,51,.45);margin-top:4px;}

    /* Manopola — grande, realistica, sul lato destro */
    .s-dial-wrap{
      position:absolute;right:10%;top:50%;transform:translateY(-50%);
      width:clamp(68px,17vw,86px);height:clamp(68px,17vw,86px);
    }
    /* Ghiera esterna */
    .s-dial-ring{
      position:absolute;inset:-5px;border-radius:50%;
      background:linear-gradient(135deg,rgba(60,40,18,.95),rgba(110,75,30,.9),rgba(50,32,14,.95));
      border:1px solid rgba(184,115,51,.2);
      box-shadow:0 0 0 2px rgba(0,0,0,.7),0 8px 22px rgba(0,0,0,.7);
    }
    /* Tacche ghiera */
    .s-dial-ring::before{
      content:'';position:absolute;inset:4px;border-radius:50%;
      background:
        repeating-conic-gradient(rgba(184,115,51,.35) 0deg 3deg, transparent 3deg 12deg);
    }
    .s-dial{
      width:100%;height:100%;border-radius:50%;position:relative;
      background:
        radial-gradient(circle at 33% 28%, rgba(140,95,45,.8) 0%, rgba(28,18,8,.96) 60%),
        conic-gradient(from 0deg,#3d2210 0%,#6e4220 12%,#2a1508 25%,#7a4a22 37%,#1e0e06 50%,#5a3218 62%,#2a1508 75%,#6e4220 87%,#3d2210 100%);
      border:2px solid rgba(184,115,51,.4);
      box-shadow:
        0 0 0 3px rgba(0,0,0,.5),
        0 0 0 4px rgba(184,115,51,.15),
        0 8px 24px rgba(0,0,0,.7),
        inset 0 2px 0 rgba(212,149,106,.35),
        inset 0 -1px 0 rgba(0,0,0,.6);
      animation:dialTick 9s ease-in-out infinite;
    }
    @keyframes dialTick{0%,100%{transform:rotate(0)}25%{transform:rotate(-18deg)}50%{transform:rotate(10deg)}75%{transform:rotate(-7deg)}}
    /* Cerchio interno inciso */
    .s-dial::before{
      content:'';position:absolute;inset:8px;border-radius:50%;
      border:1px solid rgba(184,115,51,.22);
      background:
        radial-gradient(circle at 40% 35%, rgba(255,255,255,.06), transparent 50%);
    }
    /* Indicatore */
    .s-dial::after{
      content:'';position:absolute;width:3px;height:34%;
      background:linear-gradient(to top,var(--copper),rgba(212,149,106,.5));
      left:50%;top:10%;transform:translateX(-50%);
      border-radius:2px;box-shadow:0 0 8px rgba(184,115,51,.5);
    }
    /* Tacche sul quadrante */
    .s-dial-marks{
      position:absolute;inset:0;border-radius:50%;pointer-events:none;
    }

    /* Leva/maniglia più realistica */
    .s-handle{
      position:absolute;left:12%;top:50%;transform:translateY(-50%);
      display:flex;flex-direction:column;align-items:center;gap:6px;
    }
    .s-handle-bar{
      width:clamp(14px,3.5vw,18px);height:clamp(52px,13vw,66px);
      background:linear-gradient(90deg,rgba(40,26,12,.85),rgba(100,68,28,.92),rgba(160,108,40,.88),rgba(100,68,28,.92),rgba(40,26,12,.85));
      border-radius:8px;
      border:1px solid rgba(184,115,51,.3);
      box-shadow:3px 0 12px rgba(0,0,0,.6),inset 1px 0 0 rgba(212,149,106,.18),inset -1px 0 0 rgba(0,0,0,.4);
    }
    .s-handle-bar::before{
      content:'';display:block;margin:6px auto;
      width:40%;height:calc(100% - 12px);border-radius:4px;
      background:linear-gradient(90deg,rgba(0,0,0,.25),rgba(255,255,255,.07),rgba(0,0,0,.25));
    }
    /* Bulloni maniglia */
    .s-handle-bolt{
      width:clamp(10px,2.5vw,13px);height:clamp(10px,2.5vw,13px);border-radius:50%;
      background:radial-gradient(circle at 35% 30%,rgba(160,110,45,.9),rgba(60,38,14,.95));
      border:1px solid rgba(184,115,51,.28);
      box-shadow:0 2px 5px rgba(0,0,0,.6),inset 0 1px 0 rgba(212,149,106,.2);
    }

    .s-screw{
      position:absolute;width:clamp(10px,2.6vw,15px);height:clamp(10px,2.6vw,15px);
      border-radius:50%;
      background:radial-gradient(circle at 35% 30%,rgba(80,55,22,.9),rgba(20,12,4,.97));
      border:1px solid rgba(184,115,51,.22);
      box-shadow:inset 0 1px 4px rgba(0,0,0,.75),0 1px 0 rgba(184,115,51,.1);
    }
    .s-screw::after{
      content:'';position:absolute;inset:0;border-radius:50%;
      /* tacca a croce incisa */
      background:
        linear-gradient(0deg, transparent 42%, rgba(0,0,0,.6) 42%, rgba(0,0,0,.6) 58%, transparent 58%),
        linear-gradient(90deg, transparent 42%, rgba(0,0,0,.6) 42%, rgba(0,0,0,.6) 58%, transparent 58%);
    }
    .s-screw.tl{top:16px;left:16px}.s-screw.tr{top:16px;right:16px}
    .s-screw.bl{bottom:16px;left:16px}.s-screw.br{bottom:16px;right:16px}

    .s-led{
      position:absolute;bottom:22px;left:50%;transform:translateX(-50%);
      display:flex;align-items:center;gap:6px;
    }
    .s-led-dot{
      width:8px;height:8px;border-radius:50%;
      background:radial-gradient(circle,#ff4040,#aa1010);
      box-shadow:0 0 8px #ff3030,0 0 16px rgba(255,48,48,.3);
      animation:ledBlink 2.6s ease-in-out infinite;
    }
    .s-led-label{
      font-family:var(--fsn);font-weight:200;font-size:7px;letter-spacing:.15em;
      text-transform:uppercase;color:rgba(255,80,80,.6);
    }
    @keyframes ledBlink{0%,100%{opacity:1}50%{opacity:.25}}
    body[data-state="open"] .s-led-dot{
      background:radial-gradient(circle,#44ff88,#11aa44);
      box-shadow:0 0 8px #33ff66,0 0 16px rgba(48,255,90,.3);
      animation:none;
    }
    body[data-state="open"] .s-led-label{color:rgba(80,255,140,.6);}

    /* ── SCREEN 2: PASSWORD ── */
    #sc-pwd{padding:clamp(12px,4vw,20px);}

    .pwd-card{
      width:min(400px,100%);
      background:linear-gradient(155deg,rgba(38,26,16,.97),rgba(18,12,7,.99));
      border:1px solid rgba(184,115,51,.22);border-radius:22px;
      padding:clamp(20px,5vw,34px) clamp(16px,5vw,28px) clamp(16px,4vw,24px);
      box-shadow:0 40px 100px rgba(0,0,0,.72),inset 0 1px 0 rgba(184,115,51,.1),inset 0 0 0 1px rgba(255,255,255,.025);
    }

    .pwd-ico{text-align:center;margin-bottom:14px;}
    .pwd-ico svg{width:clamp(32px,7vw,42px);height:clamp(32px,7vw,42px);color:var(--copper);
      filter:drop-shadow(0 0 10px rgba(184,115,51,.32));}

    .pwd-t{font-family:var(--fsc);font-size:clamp(22px,5.5vw,30px);color:var(--cream);text-align:center;
      margin-bottom:4px;text-shadow:0 0 18px rgba(184,115,51,.18);}
    .pwd-s{font-family:var(--fsn);font-weight:200;font-size:clamp(10px,2.5vw,12px);letter-spacing:.22em;
      text-transform:uppercase;color:rgba(184,115,51,.6);text-align:center;margin-bottom:20px;}

    .pwd-disp{
      display:flex;align-items:center;gap:10px;
      background:rgba(0,0,0,.42);border:1px solid rgba(184,115,51,.2);
      border-radius:11px;padding:12px 16px;margin-bottom:7px;min-height:52px;
    }
    .pwd-dots{flex:1;display:flex;gap:clamp(6px,2vw,12px);justify-content:center;}
    .pwd-dot{width:clamp(10px,2.8vw,13px);height:clamp(10px,2.8vw,13px);border-radius:50%;border:1.5px solid rgba(184,115,51,.3);
      background:transparent;transition:all .18s ease;}
    .pwd-dot.on{background:var(--copper);border-color:var(--copper);box-shadow:0 0 7px rgba(184,115,51,.5);}

    .pwd-del{appearance:none;border:none;background:transparent;
      color:rgba(184,115,51,.45);cursor:pointer;padding:4px;border-radius:6px;
      display:flex;align-items:center;transition:color .18s,background .18s;
      -webkit-tap-highlight-color:transparent;}
    .pwd-del:active{color:var(--copper2);background:rgba(184,115,51,.1);}

    .pwd-err{font-family:var(--fsn);font-weight:300;font-size:clamp(10px,2.5vw,12px);
      color:#e8627a;text-align:center;height:16px;margin-bottom:12px;
      opacity:0;transition:opacity .2s;letter-spacing:.06em;}
    .pwd-err.on{opacity:1;}

    .pwd-keys{display:grid;grid-template-columns:repeat(3,1fr);gap:clamp(8px,2.5vw,12px);}
    .key{
      appearance:none;border:none;
      background:linear-gradient(155deg,rgba(45,30,16,.82),rgba(28,18,8,.92));
      border:1px solid rgba(184,115,51,.16);border-radius:13px;
      color:var(--cream);font-family:var(--fsn);font-weight:300;
      font-size:clamp(19px,5vw,24px);
      height:clamp(56px,14vw,66px);
      cursor:pointer;position:relative;overflow:hidden;
      box-shadow:0 4px 10px rgba(0,0,0,.32),inset 0 1px 0 rgba(184,115,51,.09);
      transition:transform .1s,box-shadow .12s;
      -webkit-tap-highlight-color:transparent;
    }
    .key:active{transform:scale(.91);box-shadow:0 2px 5px rgba(0,0,0,.5);}
    .key-0{grid-column:2;}

    .pwd-ok{
      margin-top:12px;width:100%;height:clamp(50px,12vw,58px);
      appearance:none;border:none;
      background:linear-gradient(155deg,rgba(100,28,54,.92),rgba(65,14,32,.96));
      border:1px solid rgba(156,45,82,.32);border-radius:13px;
      color:rgba(245,232,211,.95);font-family:var(--fsn);font-weight:300;
      font-size:clamp(11px,3vw,13px);letter-spacing:.28em;text-transform:uppercase;
      cursor:pointer;
      box-shadow:0 8px 22px rgba(100,28,54,.32),inset 0 1px 0 rgba(255,130,130,.07);
      transition:all .18s;-webkit-tap-highlight-color:transparent;
    }
    .pwd-ok:hover{background:linear-gradient(155deg,rgba(120,35,65,.92),rgba(80,20,40,.96));
      box-shadow:0 12px 30px rgba(100,28,54,.42);}
    .pwd-ok:active{transform:scale(.97);}
    .pwd-ok:disabled{opacity:.3;cursor:not-allowed;}

    .pwd-bk{margin-top:10px;background:none;border:none;
      color:rgba(184,115,51,.5);font-family:var(--fsn);font-weight:200;
      font-size:clamp(10px,2.5vw,11px);letter-spacing:.22em;text-transform:uppercase;
      cursor:pointer;width:100%;padding:8px;transition:color .2s;
      -webkit-tap-highlight-color:transparent;}
    .pwd-bk:hover{color:rgba(184,115,51,.8);}

    .shake{animation:shake .38s ease;}
    @keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-9px)}40%{transform:translateX(9px)}60%{transform:translateX(-5px)}80%{transform:translateX(5px)}}

    /* ── SCREEN 3: OPEN + LETTER ── */
    #sc-open{flex-direction:column;}

    .open-lbl{font-family:var(--fsn);font-weight:300;font-size:clamp(11px,3.2vw,14px);
      letter-spacing:.32em;text-transform:uppercase;color:rgba(212,149,106,.82);
      text-shadow:0 0 18px rgba(184,115,51,.35);}

    .safe-open{position:relative;width:clamp(260px,75vw,340px);height:clamp(260px,75vw,340px);}

    .so-body{
      position:absolute;inset:0;border-radius:20px;
      background:linear-gradient(155deg,#261a0f,#18100a,#0e0906);
      border:1px solid rgba(184,115,51,.28);
      box-shadow:0 60px 120px rgba(0,0,0,.85),inset 0 1px 0 rgba(212,149,106,.14),inset 0 0 0 1px rgba(255,255,255,.03);
      overflow:hidden;
    }
    .so-body::before{content:'';position:absolute;inset:0;
      background:repeating-linear-gradient(45deg,rgba(255,255,255,.013) 0,rgba(255,255,255,.013) 1px,transparent 1px,transparent 9px);}

    .so-door{
      position:absolute;left:-4%;top:14%;bottom:14%;width:76%;
      border-radius:16px 0 0 16px;
      background:linear-gradient(90deg,#18100a,#261a0f 80%,#18100a);
      border:1px solid rgba(184,115,51,.25);border-right:none;
      box-shadow:-6px 0 28px rgba(0,0,0,.55),-18px 4px 36px rgba(0,0,0,.38);
      transform:perspective(550px) rotateY(-78deg);transform-origin:right center;
    }
    .so-door::before{content:'';position:absolute;inset:0;
      background:repeating-linear-gradient(45deg,rgba(255,255,255,.013) 0,rgba(255,255,255,.013) 1px,transparent 1px,transparent 9px);}

    .so-interior{
      position:absolute;left:13%;right:13%;top:13%;bottom:13%;border-radius:12px;
      background:
        radial-gradient(ellipse 75% 55% at 50% 28%, rgba(184,115,51,.15), rgba(0,0,0,.96) 62%),
        #040302;
      border:1px solid rgba(184,115,51,.13);
      box-shadow:inset 0 0 28px rgba(0,0,0,.82);
      display:flex;align-items:center;justify-content:center;
    }

    /* Lettera/busta */
    .letter-btn{
      appearance:none;border:none;background:transparent;padding:0;
      cursor:pointer;-webkit-tap-highlight-color:transparent;
      transition:transform .28s ease,filter .28s ease;
      animation:lFloat 3.2s ease-in-out infinite;
    }
    .letter-btn:hover{transform:translateY(-5px) scale(1.05)!important;filter:brightness(1.1);animation:none;}
    .letter-btn:active{transform:scale(.95)!important;animation:none;}
    @keyframes lFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}

    .env{width:clamp(118px,30vw,160px);height:clamp(84px,22vw,116px);position:relative;}

    .env-b{
      position:absolute;inset:0;border-radius:7px;
      background:linear-gradient(155deg,#f5e8d3,#e6cfb2,#d3b596);
      border:1px solid rgba(130,82,35,.28);
      box-shadow:0 10px 36px rgba(0,0,0,.58),0 0 18px rgba(184,115,51,.1),inset 0 1px 0 rgba(255,255,255,.38);
    }
    .env-b::before{content:'';position:absolute;inset:0;border-radius:7px;
      background:
        linear-gradient(135deg,rgba(184,115,51,.1) 25%,transparent 25%) -8px 0,
        linear-gradient(225deg,rgba(184,115,51,.1) 25%,transparent 25%) -8px 0,
        linear-gradient(315deg,rgba(184,115,51,.1) 25%,transparent 25%),
        linear-gradient(45deg,rgba(184,115,51,.1) 25%,transparent 25%);
      background-size:18px 18px;opacity:.35;}

    .env-flap{position:absolute;top:0;left:0;right:0;height:54%;
      clip-path:polygon(0% 0%,50% 82%,100% 0%);
      background:linear-gradient(180deg,#e6cfb2,#d3b596);
      border-bottom:1px solid rgba(130,82,35,.18);}

    .env-lines::before,.env-lines::after{
      content:'';position:absolute;top:50%;height:50%;width:50%;border-top:1px solid rgba(130,82,35,.13);}
    .env-lines{position:absolute;top:50%;left:0;right:0;height:50%;overflow:hidden;}
    .env-lines::before{left:0;border-right:1px solid rgba(130,82,35,.13);}
    .env-lines::after{right:0;}

    .env-seal{
      position:absolute;
      width:clamp(26px,6.5vw,34px);height:clamp(26px,6.5vw,34px);
      border-radius:50%;left:50%;top:36%;transform:translate(-50%,-50%);
      background:radial-gradient(circle at 33% 28%,#c43a5c,#7a1432);
      border:1px solid rgba(255,170,170,.18);
      box-shadow:0 4px 12px rgba(100,28,54,.55),0 0 18px rgba(196,58,92,.18);
      display:flex;align-items:center;justify-content:center;
      font-family:var(--fs);font-size:clamp(7px,1.8vw,10px);
      color:rgba(255,228,232,.9);font-style:italic;z-index:2;
    }

    .env-txt{
      position:absolute;bottom:10%;left:0;right:0;text-align:center;
      font-family:var(--fsc);font-size:clamp(11px,3vw,15px);
      color:rgba(55,32,12,.72);line-height:1.25;
    }

    .env-glow{
      position:absolute;bottom:-18px;left:50%;transform:translateX(-50%);
      width:78%;height:18px;
      background:radial-gradient(ellipse,rgba(184,115,51,.28),transparent 70%);
      filter:blur(5px);pointer-events:none;
      animation:lFloat 3.2s ease-in-out infinite;
    }

    .open-hint{font-family:var(--fsn);font-weight:300;font-size:clamp(11px,3.2vw,13px);
      letter-spacing:.28em;text-transform:uppercase;color:rgba(212,149,106,.78);
      text-shadow:0 0 16px rgba(184,115,51,.3);
      animation:pulse 2.6s ease-in-out infinite;}
    @keyframes pulse{0%,100%{opacity:.65}50%{opacity:1}}

    /* ── VIDEO MODAL ── */
    .vmod{
      display:none;position:fixed;inset:0;z-index:200;
      background:rgba(0,0,0,0);transition:background .4s ease;
      align-items:center;justify-content:center;flex-direction:column;
    }
    .vmod.active{display:flex;background:rgba(4,2,7,.95);}
    .vmod.vis{background:rgba(4,2,7,.98);}

    .vmod-inner{position:relative;width:100%;flex:1;min-height:0;
      display:flex;align-items:center;justify-content:center;padding-bottom:80px;}

    .vmod video{display:block;width:100%;height:100%;max-width:100vw;
      max-height:calc(100dvh - 142px);object-fit:contain;background:#000;}
    @media(min-width:600px){
      .vmod-inner{padding:14px 18px 88px;max-width:880px;margin:0 auto;}
      .vmod video{border-radius:10px;max-height:calc(100dvh - 158px);
        border:1px solid rgba(184,115,51,.14);box-shadow:0 40px 100px rgba(0,0,0,.72);}
    }

    .vclose{
      position:fixed;top:max(12px,env(safe-area-inset-top,12px));right:max(12px,env(safe-area-inset-right,12px));
      z-index:210;appearance:none;width:44px;height:44px;border-radius:50%;
      border:1px solid rgba(184,115,51,.38);background:rgba(6,4,10,.8);
      color:rgba(245,232,211,.88);font-size:17px;
      display:flex;align-items:center;justify-content:center;cursor:pointer;
      backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
      box-shadow:0 6px 22px rgba(0,0,0,.5);transition:transform .14s;
      -webkit-tap-highlight-color:transparent;
    }
    .vclose:active{transform:scale(.88);}

    .vplay-ov{
      position:absolute;inset:0;bottom:80px;
      display:flex;align-items:center;justify-content:center;
      background:rgba(0,0,0,.38);opacity:0;pointer-events:none;transition:opacity .25s;
    }
    .vplay-ov.on{opacity:1;pointer-events:auto;}
    .play-ring{
      width:74px;height:74px;border-radius:50%;
      border:2px solid rgba(184,115,51,.58);background:rgba(6,4,10,.62);
      display:flex;align-items:center;justify-content:center;cursor:pointer;
      backdrop-filter:blur(7px);-webkit-backdrop-filter:blur(7px);
      box-shadow:0 0 36px rgba(184,115,51,.18);transition:transform .14s;
      -webkit-tap-highlight-color:transparent;
    }
    .play-ring:active{transform:scale(.88);}
    .play-tri{width:0;height:0;border-left:21px solid rgba(245,232,211,.94);
      border-top:12px solid transparent;border-bottom:12px solid transparent;margin-left:4px;}

    .vload{position:absolute;inset:0;bottom:80px;
      display:flex;flex-direction:column;align-items:center;justify-content:center;gap:11px;pointer-events:none;}
    .vload.off{display:none;}
    .spinner{width:42px;height:42px;border-radius:50%;
      border:2px solid rgba(184,115,51,.18);border-top-color:rgba(184,115,51,.82);
      animation:spin 1s linear infinite;}
    @keyframes spin{to{transform:rotate(360deg)}}
    .vload-t{font-family:var(--fsn);font-weight:200;font-size:11px;letter-spacing:.22em;
      text-transform:uppercase;color:rgba(184,115,51,.55);}

    /* Controlli */
    .vcbar{
      position:fixed;bottom:0;left:0;right:0;z-index:215;
      padding:11px 14px max(12px,env(safe-area-inset-bottom,12px));
      background:linear-gradient(0deg,rgba(4,2,7,.92) 0%,rgba(4,2,7,.58) 68%,transparent 100%);
      display:none;flex-direction:column;gap:9px;
    }
    .vmod.active .vcbar{display:flex;}

    .vcp{position:relative;height:3px;border-radius:999px;
      background:rgba(245,232,211,.1);cursor:pointer;touch-action:none;
      -webkit-tap-highlight-color:transparent;}
    .vcp::before{content:'';position:absolute;inset:-13px 0;border-radius:999px;}
    .vcpf{height:100%;border-radius:999px;width:0%;
      background:linear-gradient(90deg,var(--copper),var(--copper2));
      box-shadow:0 0 7px rgba(184,115,51,.38);pointer-events:none;}
    .vcpth{position:absolute;top:50%;width:11px;height:11px;border-radius:50%;
      background:var(--cream);border:2px solid var(--copper);
      box-shadow:0 0 9px rgba(184,115,51,.45);
      transform:translate(-50%,-50%) scale(0);pointer-events:none;transition:transform .14s;left:0%;}
    .vcp:hover .vcpth,.vcp.drag .vcpth{transform:translate(-50%,-50%) scale(1);}

    .vcrow{display:flex;align-items:center;gap:2px;}
    .vctime{font-family:var(--fsn);font-weight:200;font-size:10.5px;
      color:rgba(245,232,211,.55);letter-spacing:.05em;font-variant-numeric:tabular-nums;
      white-space:nowrap;margin-left:5px;}
    .vcspc{flex:1;}
    .vcbtn{appearance:none;background:transparent;border:none;color:rgba(245,232,211,.75);
      width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;
      cursor:pointer;flex-shrink:0;transition:background .14s,transform .1s;
      -webkit-tap-highlight-color:transparent;}
    .vcbtn:active{transform:scale(.84);background:rgba(184,115,51,.09);}
    .vcbtn svg{pointer-events:none;}

    .vcvw{display:flex;align-items:center;gap:3px;overflow:hidden;max-width:0;opacity:0;
      transition:max-width .28s,opacity .28s;}
    .vcvw.open{max-width:86px;opacity:1;}
    input[type=range].vcvol{-webkit-appearance:none;appearance:none;
      width:68px;height:3px;border-radius:999px;background:rgba(245,232,211,.16);outline:none;cursor:pointer;}
    input[type=range].vcvol::-webkit-slider-thumb{-webkit-appearance:none;
      width:11px;height:11px;border-radius:50%;background:var(--cream);
      border:2px solid var(--copper);box-shadow:0 0 7px rgba(184,115,51,.38);}
    input[type=range].vcvol::-moz-range-thumb{width:11px;height:11px;border-radius:50%;
      background:var(--cream);border:2px solid var(--copper);}

    @media(prefers-reduced-motion:reduce){*,*::before,*::after{animation:none!important;transition:none!important;}}
  </style>
</head>
<body data-state="safe">
  <canvas id="bgc" aria-hidden="true"></canvas>
  <div class="vignette" aria-hidden="true"></div>

  <div id="stage">

    <!-- S1: cassaforte chiusa -->
    <div id="sc-safe" class="screen active" style="display:flex;flex-direction:column;align-items:center;gap:clamp(14px,3.5vw,24px)">
      <p class="hint">Tocca per aprire</p>
      <div class="safe3d" id="safeTrigger" role="button" tabindex="0" aria-label="Apri la cassaforte">
        <div class="s-body">
          <div class="s-rim"></div>
          <!-- Pannello sportello incassato -->
          <div class="s-door-panel"></div>
          <!-- Cerniere lato sinistro -->
          <div class="s-hinges">
            <div class="s-hinge"></div>
            <div class="s-hinge"></div>
            <div class="s-hinge"></div>
          </div>
          <!-- Targa -->
          <div class="s-plaque">
            <div class="s-title">Per Te</div>
            <div class="s-sub">un segreto</div>
          </div>
          <!-- Manopola -->
          <div class="s-dial-wrap">
            <div class="s-dial-ring"></div>
            <div class="s-dial"><div class="s-dial-marks"></div></div>
          </div>
          <!-- Maniglia con bulloni -->
          <div class="s-handle">
            <div class="s-handle-bolt"></div>
            <div class="s-handle-bar"></div>
            <div class="s-handle-bolt"></div>
          </div>
          <!-- Viti angolari -->
          <div class="s-screw tl"></div><div class="s-screw tr"></div>
          <div class="s-screw bl"></div><div class="s-screw br"></div>
          <!-- LED status -->
          <div class="s-led">
            <div class="s-led-dot"></div>
            <span class="s-led-label">armed</span>
          </div>
        </div>
      </div>
    </div>

    <!-- S2: password -->
    <div id="sc-pwd" class="screen" style="display:flex;flex-direction:column;align-items:center">
      <div class="pwd-card" id="pwdCard">
        <div class="pwd-ico">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
        </div>
        <h2 class="pwd-t">Combinazione</h2>
        <p class="pwd-s">inserisci il codice</p>
        <div class="pwd-disp">
          <div class="pwd-dots" id="pwdDots"></div>
          <button class="pwd-del" id="pwdDel" type="button" aria-label="Cancella">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 4H8l-7 8 7 8h13a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2z"/>
              <line x1="18" y1="9" x2="12" y2="15"/><line x1="12" y1="9" x2="18" y2="15"/>
            </svg>
          </button>
        </div>
        <p class="pwd-err" id="pwdErr">Codice errato, riprova</p>
        <div class="pwd-keys" id="pwdKeys">
          <button class="key" data-d="1" type="button">1</button>
          <button class="key" data-d="2" type="button">2</button>
          <button class="key" data-d="3" type="button">3</button>
          <button class="key" data-d="4" type="button">4</button>
          <button class="key" data-d="5" type="button">5</button>
          <button class="key" data-d="6" type="button">6</button>
          <button class="key" data-d="7" type="button">7</button>
          <button class="key" data-d="8" type="button">8</button>
          <button class="key" data-d="9" type="button">9</button>
          <button class="key key-0" data-d="0" type="button">0</button>
        </div>
        <button class="pwd-ok" id="pwdOk" type="button" disabled>Apri</button>
        <button class="pwd-bk" id="pwdBk" type="button">← Indietro</button>
      </div>
    </div>

    <!-- S3: cassaforte aperta + lettera -->
    <div id="sc-open" class="screen" style="display:flex;flex-direction:column;align-items:center;gap:clamp(10px,2.8vw,18px)">
      <p class="open-lbl">Un messaggio per te</p>
      <div class="safe-open">
        <div class="so-body">
          <div class="s-screw tl"></div><div class="s-screw tr"></div>
          <div class="s-screw bl"></div><div class="s-screw br"></div>
        </div>
        <div class="so-door"></div>
        <div class="so-interior">
          <button class="letter-btn" id="letterBtn" type="button" aria-label="Apri la lettera">
            <div class="env">
              <div class="env-b">
                <div class="env-flap"></div>
                <div class="env-lines"></div>
              </div>
              <div class="env-seal">❤</div>
              <div class="env-txt">Per te<br><span style="font-size:.78em;opacity:.65">amore mio</span></div>
            </div>
            <div class="env-glow"></div>
          </button>
        </div>
      </div>
      <p class="open-hint">Tocca la lettera</p>
    </div>

  </div>

  <!-- VIDEO MODAL -->
  <div class="vmod" id="vmod" role="dialog" aria-modal="true">
    <button class="vclose" id="vclose" type="button" aria-label="Chiudi">✕</button>
    <div class="vmod-inner">
      <div style="position:relative;width:100%;flex:1;min-height:0;display:flex;align-items:center;justify-content:center;">
        <video id="vid" playsinline webkit-playsinline x5-playsinline preload="metadata">
          <source id="vsrc" src="Should Cat Build A Pickup Truck.mp4" type="video/mp4"/>
        </video>
        <div class="vload" id="vload"><div class="spinner"></div><div class="vload-t">apertura in corso</div></div>
        <div class="vplay-ov" id="vpov" aria-hidden="true">
          <div class="play-ring" id="vpbtn" role="button" tabindex="0" aria-label="Riproduci"><div class="play-tri"></div></div>
        </div>
      </div>
    </div>
    <div class="vcbar" id="vcbar">
      <div class="vcp" id="vcp" role="slider" aria-label="Posizione" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0" tabindex="0">
        <div class="vcpf" id="vcpf"></div><div class="vcpth" id="vcpth"></div>
      </div>
      <div class="vcrow">
        <button class="vcbtn" id="vskb" type="button" aria-label="Indietro 10s">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-4.5"/>
            <text x="8" y="15" font-size="5.5" fill="currentColor" stroke="none" font-family="sans-serif" font-weight="700">10</text>
          </svg>
        </button>
        <button class="vcbtn" id="vpp" type="button" aria-label="Pausa">
          <svg id="ipause" width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16" rx="1"/><rect x="14" y="4" width="4" height="16" rx="1"/></svg>
          <svg id="iplay" width="20" height="20" viewBox="0 0 24 24" fill="currentColor" style="display:none"><polygon points="5,3 19,12 5,21"/></svg>
        </button>
        <button class="vcbtn" id="vskf" type="button" aria-label="Avanti 10s">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-.49-4.5"/>
            <text x="8" y="15" font-size="5.5" fill="currentColor" stroke="none" font-family="sans-serif" font-weight="700">10</text>
          </svg>
        </button>
        <span class="vctime" id="vctime">0:00 / 0:00</span>
        <div class="vcspc"></div>
        <div class="vcvw" id="vcvw"><input type="range" class="vcvol" id="vcvol" min="0" max="1" step="0.02" value="1" aria-label="Volume"/></div>
        <button class="vcbtn" id="vcvbtn" type="button" aria-label="Volume">
          <svg id="ivon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
            <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
          </svg>
          <svg id="ivoff" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none">
            <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
            <line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/>
          </svg>
        </button>
      </div>
    </div>
  </div>

  <script>
    /* CONFIG */
    const PASSWORD  = "010226";
    const VIDEO_SRC = "Should Cat Build A Pickup Truck.mp4";
    const PLEN = PASSWORD.length;

    function nu(s){const t=String(s||'').trim();return /^[a-zA-Z]:[\\/]/.test(t)?'file:///'+t.replace(/\\/g,'/'):t;}
    document.getElementById('vsrc').src = nu(VIDEO_SRC);

    /* STATO */
    let cur='safe', pv='';

    /* ELEMENTI */
    const sSafe=document.getElementById('sc-safe'),sPwd=document.getElementById('sc-pwd'),sOpen=document.getElementById('sc-open');
    const safeTrig=document.getElementById('safeTrigger');
    const pwdCard=document.getElementById('pwdCard'),pwdDots=document.getElementById('pwdDots');
    const pwdErr=document.getElementById('pwdErr'),pwdOk=document.getElementById('pwdOk');
    const pwdBk=document.getElementById('pwdBk'),pwdDel=document.getElementById('pwdDel');
    const letterBtn=document.getElementById('letterBtn');
    const vmod=document.getElementById('vmod'),vid=document.getElementById('vid');
    const vload=document.getElementById('vload'),vpov=document.getElementById('vpov');
    const vpbtn=document.getElementById('vpbtn'),vclose=document.getElementById('vclose');

    /* NAVIGAZIONE */
    function goTo(id){
      [sSafe,sPwd,sOpen].forEach(s=>{s.classList.remove('active','exit');s.classList.add('exit');});
      const nx=document.getElementById('sc-'+id);
      setTimeout(()=>{[sSafe,sPwd,sOpen].forEach(s=>s.classList.remove('exit'));nx.classList.add('active');cur=id;},340);
    }

    /* S1 → S2 */
    safeTrig.addEventListener('click',()=>{buildDots();goTo('pwd');});
    safeTrig.addEventListener('keydown',e=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();safeTrig.click();}});

    /* TASTIERINO */
    function buildDots(){
      pwdDots.innerHTML='';
      for(let i=0;i<PLEN;i++){const d=document.createElement('div');d.className='pwd-dot';d.id='d'+i;pwdDots.appendChild(d);}
    }
    function syncDots(){
      for(let i=0;i<PLEN;i++){const d=document.getElementById('d'+i);if(d)d.classList.toggle('on',i<pv.length);}
      pwdOk.disabled=pv.length<PLEN;
    }
    document.getElementById('pwdKeys').addEventListener('click',e=>{
      const k=e.target.closest('.key');if(!k||pv.length>=PLEN)return;
      pv+=k.dataset.d;pwdErr.classList.remove('on');syncDots();
      if(pv.length===PLEN)setTimeout(()=>pwdOk.click(),100);
    });
    pwdDel.addEventListener('click',()=>{pv=pv.slice(0,-1);pwdErr.classList.remove('on');syncDots();});
    pwdBk.addEventListener('click',()=>{pv='';syncDots();pwdErr.classList.remove('on');goTo('safe');});
    pwdOk.addEventListener('click',()=>{
      if(pv===PASSWORD){
        document.body.setAttribute('data-state','open');goTo('open');pv='';
      } else {
        pwdErr.classList.add('on');pwdCard.classList.remove('shake');void pwdCard.offsetWidth;
        pwdCard.classList.add('shake');pv='';syncDots();
        setTimeout(()=>pwdCard.classList.remove('shake'),400);
      }
    });
    document.addEventListener('keydown',e=>{
      if(cur!=='pwd')return;
      if(e.key>='0'&&e.key<='9'&&pv.length<PLEN){pv+=e.key;syncDots();pwdErr.classList.remove('on');if(pv.length===PLEN)setTimeout(()=>pwdOk.click(),100);}
      if(e.key==='Backspace'){pv=pv.slice(0,-1);syncDots();}
      if(e.key==='Enter'&&!pwdOk.disabled)pwdOk.click();
      if(e.key==='Escape')pwdBk.click();
    });

    /* LETTERA → VIDEO */
    letterBtn.addEventListener('click',openModal);

    /* MODAL */
    function openModal(){
      vmod.classList.add('active');
      requestAnimationFrame(()=>requestAnimationFrame(()=>vmod.classList.add('vis')));
      document.body.style.overflow='hidden';
      vclose.focus({preventScroll:true});
      play();
    }
    function closeModal(){
      vid.pause();vid.currentTime=0;
      vmod.classList.remove('vis');document.body.style.overflow='';
      try{if(document.fullscreenElement)document.exitFullscreen().catch(()=>{});if(document.webkitFullscreenElement)document.webkitExitFullscreen?.();}catch(_){}
      setTimeout(()=>{vmod.classList.remove('active');vload.classList.remove('off');vpov.classList.remove('on');vpov.setAttribute('aria-hidden','true');},340);
    }
    vclose.addEventListener('click',closeModal);
    document.addEventListener('keydown',e=>{if(e.key==='Escape'&&vmod.classList.contains('active'))closeModal();});

    async function play(){
      vload.classList.remove('off');vpov.classList.remove('on');vpov.setAttribute('aria-hidden','true');
      try{vid.muted=false;await vid.play();}
      catch(_){try{vid.muted=true;await vid.play();}catch(__){showPBtn();}}
    }
    function showPBtn(){vload.classList.add('off');vpov.classList.add('on');vpov.setAttribute('aria-hidden','false');vid.controls=true;}
    vid.addEventListener('loadeddata',()=>vload.classList.add('off'));
    vid.addEventListener('canplay',()=>vload.classList.add('off'));
    vid.addEventListener('playing',()=>{vload.classList.add('off');vpov.classList.remove('on');vpov.setAttribute('aria-hidden','true');vid.controls=false;});
    vid.addEventListener('error',showPBtn);
    vid.addEventListener('waiting',()=>vload.classList.remove('off'));

    function manPlay(){
      vpov.classList.remove('on');vpov.setAttribute('aria-hidden','true');vid.controls=false;vid.muted=false;
      vid.play().catch(()=>{vid.controls=true;vpov.classList.add('on');vpov.setAttribute('aria-hidden','false');});
      try{const r=vid.requestFullscreen||vid.webkitRequestFullscreen;if(typeof r==='function')r.call(vid).catch(()=>{});}catch(_){}
    }
    vpbtn.addEventListener('click',manPlay);
    vpbtn.addEventListener('keydown',e=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();manPlay();}});

    /* CONTROLLI */
    const vcp=document.getElementById('vcp'),vcpf=document.getElementById('vcpf'),vcpth=document.getElementById('vcpth');
    const vpp=document.getElementById('vpp'),vskb=document.getElementById('vskb'),vskf=document.getElementById('vskf');
    const vctime=document.getElementById('vctime'),vcvbtn=document.getElementById('vcvbtn');
    const vcvw=document.getElementById('vcvw'),vcvol=document.getElementById('vcvol');
    const ipause=document.getElementById('ipause'),iplay=document.getElementById('iplay');
    const ivon=document.getElementById('ivon'),ivoff=document.getElementById('ivoff');

    function ft(s){if(!isFinite(s))return'0:00';return Math.floor(s/60)+':'+String(Math.floor(s%60)).padStart(2,'0');}
    function updP(){const d=vid.duration||0,c=vid.currentTime||0,p=d>0?(c/d)*100:0;vcpf.style.width=p+'%';vcpth.style.left=p+'%';vcp.setAttribute('aria-valuenow',Math.round(p));vctime.textContent=ft(c)+' / '+ft(d);}
    function updI(){const p=vid.paused||vid.ended;ipause.style.display=p?'none':'';iplay.style.display=p?'':'none';vpp.setAttribute('aria-label',p?'Riproduci':'Pausa');}
    vid.addEventListener('timeupdate',updP);vid.addEventListener('durationchange',updP);
    vid.addEventListener('play',updI);vid.addEventListener('pause',updI);vid.addEventListener('ended',updI);

    vpp.addEventListener('click',()=>{vid.paused||vid.ended?vid.play().catch(()=>{}):vid.pause();});
    vskb.addEventListener('click',()=>{vid.currentTime=Math.max(0,vid.currentTime-10);});
    vskf.addEventListener('click',()=>{vid.currentTime=Math.min(vid.duration||0,vid.currentTime+10);});

    let seek=false;
    function skTo(cx){const r=vcp.getBoundingClientRect(),p=Math.max(0,Math.min(1,(cx-r.left)/r.width)),d=vid.duration;if(d&&isFinite(d)){vid.currentTime=p*d;updP();}}
    vcp.addEventListener('mousedown',e=>{seek=true;vcp.classList.add('drag');skTo(e.clientX);});
    window.addEventListener('mousemove',e=>{if(seek)skTo(e.clientX);});
    window.addEventListener('mouseup',()=>{if(seek){seek=false;vcp.classList.remove('drag');}});
    vcp.addEventListener('touchstart',e=>{seek=true;vcp.classList.add('drag');skTo(e.touches[0].clientX);},{passive:true});
    window.addEventListener('touchmove',e=>{if(seek)skTo(e.touches[0].clientX);},{passive:true});
    window.addEventListener('touchend',()=>{if(seek){seek=false;vcp.classList.remove('drag');}});
    vcp.addEventListener('keydown',e=>{if(e.key==='ArrowRight')vid.currentTime=Math.min(vid.duration||0,vid.currentTime+5);if(e.key==='ArrowLeft')vid.currentTime=Math.max(0,vid.currentTime-5);});

    const isT=window.matchMedia('(pointer:coarse)').matches;
    if(!isT){let vo=false;vcvbtn.addEventListener('click',()=>{vo=!vo;vcvw.classList.toggle('open',vo);});}
    else{vcvbtn.addEventListener('click',()=>{vid.muted=!vid.muted;updV();});}
    vcvol.addEventListener('input',()=>{vid.volume=parseFloat(vcvol.value);vid.muted=vid.volume===0;updV();});
    function updV(){const m=vid.muted||vid.volume===0;ivon.style.display=m?'none':'';ivoff.style.display=m?'':'none';vcvol.value=m?0:vid.volume;}
    document.addEventListener('keydown',e=>{
      if(!vmod.classList.contains('active'))return;if(e.target===vcp)return;
      if(e.key===' '||e.key==='k'){e.preventDefault();vpp.click();}
      if(e.key==='ArrowRight'){e.preventDefault();vskf.click();}
      if(e.key==='ArrowLeft'){e.preventDefault();vskb.click();}
      if(e.key==='m'){vid.muted=!vid.muted;updV();}
    });

    /* PARTICELLE */
    (function(){
      const c=document.getElementById('bgc'),ctx=c.getContext('2d',{alpha:true});
      let w=0,h=0;const DPR=Math.min(2,devicePixelRatio||1);let pts=[];
      function rsz(){w=innerWidth;h=innerHeight;c.width=Math.floor(w*DPR);c.height=Math.floor(h*DPR);c.style.width=w+'px';c.style.height=h+'px';ctx.setTransform(DPR,0,0,DPR,0,0);spwn();}
      function spwn(){const n=Math.round(Math.min(65,Math.max(28,(w*h)/24000)));pts=Array.from({length:n},()=>({x:Math.random()*w,y:Math.random()*h,vx:(Math.random()-.5)*.055,vy:(Math.random()-.5)*.048,a:.05+Math.random()*.2,sz:.35+Math.random()*1.3,hue:Math.random()>.55?28+Math.random()*32:255+Math.random()*65,tw:.45+Math.random()*1.4}));}
      let t0=performance.now();
      function fr(now){const dt=Math.min(32,now-t0);t0=now;ctx.clearRect(0,0,w,h);
        const g=ctx.createRadialGradient(w*.5,h*.4,18,w*.5,h*.42,Math.max(w,h)*.65);
        g.addColorStop(0,'rgba(184,115,51,.07)');g.addColorStop(.5,'rgba(100,28,54,.04)');g.addColorStop(1,'rgba(0,0,0,0)');
        ctx.fillStyle=g;ctx.fillRect(0,0,w,h);
        for(const p of pts){p.x+=p.vx*dt;p.y+=p.vy*dt;
          if(p.x<-4)p.x=w+4;if(p.x>w+4)p.x=-4;if(p.y<-4)p.y=h+4;if(p.y>h+4)p.y=-4;
          const tw=.52+.48*Math.sin((now/1000)*p.tw+p.x*.01);
          ctx.beginPath();ctx.fillStyle=`hsla(${p.hue},68%,62%,${p.a*tw})`;ctx.arc(p.x,p.y,p.sz,0,Math.PI*2);ctx.fill();}
        requestAnimationFrame(fr);}
      window.addEventListener('resize',rsz,{passive:true});rsz();requestAnimationFrame(fr);
    })();
  </script>
</body>
</html>
